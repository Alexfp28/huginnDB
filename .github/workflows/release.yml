name: release

# Trigger: pushing an annotated tag like `v0.2.1`, `v0.3.0-rc1`, etc.
# The workflow compiles the Tauri app, signs the updater artifacts with
# the keypair stored in repo secrets, and publishes a *draft* GitHub
# Release with the binaries + `latest.json` attached. The maintainer
# reviews and clicks "Publish" manually.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — output of `pnpm tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — password used when generating the key
#
# See RELEASING.md at the repo root for the one-time setup steps.

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger for first-time signing-key smoke tests, before a real
  # tag is ever published. Provide a synthetic tag name as input — the
  # workflow uses it for both the GitHub release and the bundle version
  # metadata. Re-runs against the same tag will fail (a release with
  # that name already exists), so pick a throwaway like `v0.0.0-test`.
  workflow_dispatch:
    inputs:
      tag:
        description: "Synthetic tag name to use for the draft release"
        required: true
        default: "v0.0.0-test"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to windows-2022, not windows-latest: GitHub migrated
          # windows-latest to Windows Server 2025 + VS2026 in June 2026,
          # which broke WiX v3 bundling here (see this file's git history for
          # the Windows Defender / VBScript fixes that were tried and didn't
          # help). WiX v3 — what tauri-action uses to build the MSI — was
          # archived end-of-life in February 2025 and will never be updated
          # for compatibility with an OS that didn't exist when it was
          # frozen. Rather than chase individual incompatibilities, stay on
          # the last image generation WiX v3 was actually built against.
          - platform: windows-2022
            args: ""
          # Uncomment to also ship Linux artifacts. Leaving disabled by
          # default keeps the runtime + signing surface small for now.
          # - platform: ubuntu-22.04
          #   args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version is intentionally not pinned here — pnpm/action-setup
        # reads `packageManager` from package.json. Specifying both
        # produces ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # pnpm 11 (pinned via package.json `packageManager`) requires
          # Node >= 22.13 — it `require`s the built-in `node:sqlite`, absent
          # before Node 22.5, so Node 20 crashes install with
          # ERR_UNKNOWN_BUILTIN_MODULE. Keep this >= 22.13.
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Resolve a single source of truth for the tag name. On tag pushes
      # `github.ref_name` already holds the tag; on manual dispatch we
      # take the user-supplied input instead.
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          # Mark anything with a hyphen (e.g. v0.3.0-rc1, v0.0.0-test) as
          # a GitHub prerelease so the auto-updater never picks it up via
          # /releases/latest. Stable tags stay non-prerelease.
          if [[ "${{ github.event_name }}" = "workflow_dispatch" || "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Stages the `huginndb-mcp` sidecar so tauri-action's build below finds
      # it at the `bundle.externalBin` path in tauri.conf.json and ships it
      # inside the installer, next to the main executable. Built from a
      # separate workspace crate (mcp-server/) on purpose — see gotcha #20 in
      # CLAUDE.md for why it isn't a second `[[bin]]` in the app's own
      # Cargo.toml. Tauri's sidecar convention needs the binary named
      # `<name>-<target-triple>[.exe]`; `rustc -Vv`'s `host:` line gives the
      # triple for whichever platform is currently building.
      #
      # The placeholder touch below is load-bearing, not defensive: tauri-build
      # (huginndb's build.rs) hard-fails ANY compile of huginndb_lib — even a
      # bare `cargo check`, even just as a dependency of huginndb-mcp itself —
      # if the externalBin resource for the current target triple doesn't
      # already exist on disk (existence only; content doesn't matter yet).
      # Since building huginndb-mcp requires compiling huginndb_lib (with the
      # `mcp` feature) first, that's a real circular dependency: the very
      # `cargo build -p huginndb-mcp` step meant to produce the sidecar can't
      # even start on a clean checkout without something already at that path.
      # `rm` before the final `cp` (not overwriting in place) matters too —
      # `cp` onto an existing file keeps that file's mode, so overwriting the
      # placeholder in place would silently ship a non-executable sidecar.
      - name: Build and stage the huginndb-mcp sidecar
        shell: bash
        run: |
          triple="$(rustc -Vv | sed -n 's/^host: //p')"
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/huginndb-mcp-${triple}.exe" "src-tauri/binaries/huginndb-mcp-${triple}"
          cargo build --release -p huginndb-mcp --manifest-path src-tauri/Cargo.toml
          rm -f "src-tauri/binaries/huginndb-mcp-${triple}.exe" "src-tauri/binaries/huginndb-mcp-${triple}"
          if [ -f src-tauri/target/release/huginndb-mcp.exe ]; then
            cp src-tauri/target/release/huginndb-mcp.exe "src-tauri/binaries/huginndb-mcp-${triple}.exe"
          else
            cp src-tauri/target/release/huginndb-mcp "src-tauri/binaries/huginndb-mcp-${triple}"
          fi

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.resolve_tag.outputs.tag }}
          releaseName: "HuginnDB ${{ steps.resolve_tag.outputs.tag }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Alexfp28/huginnDB/blob/main/CHANGELOG.md) for the full list of changes.

            Installed builds with auto-update support will detect this release on next launch and offer to install it from inside the app.
          releaseDraft: true
          prerelease: ${{ steps.resolve_tag.outputs.prerelease }}
          args: ${{ matrix.args }}
